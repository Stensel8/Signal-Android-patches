name: Build Check

# Runs on every PR to verify the app compiles and unit tests pass.
# Skips the upstream signalapp repo (they have their own CI).
on:
  pull_request:

permissions:
  contents: read

jobs:
  build-check:
    name: assembleDebug + unit tests
    if: ${{ github.repository != 'signalapp/Signal-Android' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@06832c7b30a0129d7fb559bcc6e43d26f6374244 # v4.3.1

      - name: Build debug APK (assembleDebug)
        run: ./gradlew assembleDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload test reports on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports
          path: |
            */build/reports/tests/
            */build/reports/lint-results*
          retention-days: 7
