name: Build Check

# Runs on every PR to verify the app compiles and unit tests pass.
# Skips the upstream signalapp repo (they have their own CI).
on:
  pull_request:

permissions:
  contents: read

jobs:
  build-check:
    name: assembleDebug + unit tests
    if: ${{ github.repository != 'signalapp/Signal-Android' }}
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Build debug APK (assembleDebug)
        run: |
          ./gradlew assembleDebug --stacktrace \
            --dependency-verification=off \
            -Dorg.gradle.jvmargs="-Xmx16g -XX:MaxMetaspaceSize=1g" \
            -Dorg.gradle.workers.max=8 \
            -Pkotlin.incremental=false

      - name: Run unit tests
        run: |
          ./gradlew testDebugUnitTest --stacktrace \
            --dependency-verification=off \
            -Dorg.gradle.jvmargs="-Xmx16g -XX:MaxMetaspaceSize=1g" \
            -Dorg.gradle.workers.max=8 \
            -Pkotlin.incremental=false

      - name: Upload test reports on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports
          path: |
            */build/reports/tests/
            */build/reports/lint-results*
          retention-days: 7
