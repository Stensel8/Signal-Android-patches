name: Update Gradle Verification Metadata

# Triggered when Renovate or Dependabot opens/updates a PR that touches dependency
# definitions. Deletes and fully regenerates verification-metadata.xml from scratch
# so stale checksums for old artifact versions are removed automatically.

on:
  pull_request:
    branches: [main]
    paths:
      - 'gradle/libs.versions.toml'
      - 'gradle/wrapper/gradle-wrapper.properties'

permissions:
  contents: write

jobs:
  update-metadata:
    name: Regenerate verification-metadata.xml
    runs-on: ubuntu-latest
    if: |
      github.repository != 'signalapp/Signal-Android' &&
      (startsWith(github.head_ref, 'renovate/') || startsWith(github.head_ref, 'dependabot/'))

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Delete existing verification metadata
        run: rm -f gradle/verification-metadata.xml

      - name: Resolve buildscript and plugin classpath
        run: |
          ./gradlew help \
            --write-verification-metadata sha256 \
            --dependency-verification=off \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Pkotlin.incremental=false

      - name: Resolve all app and test dependencies
        run: |
          ./gradlew :Signal-Android:dependencies \
            --write-verification-metadata sha256 \
            --dependency-verification=off \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Pkotlin.incremental=false

      - name: Commit updated checksums
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle/verification-metadata.xml
          if git diff --staged --quiet; then
            echo "Checksums already up to date, nothing to commit."
          else
            git commit -m "chore: update gradle dependency verification metadata"
            git push
          fi
