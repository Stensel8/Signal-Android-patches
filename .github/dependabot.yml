version: 2
updates:
  # GitHub Actions — pin workflow steps to SHA, update daily at 10:30 CEST (08:30 UTC).
  # Renovate handles all Gradle/Maven/Docker dependencies.
  # Dependabot handles only GitHub Actions workflow step SHA pinning.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "10:30"
      timezone: "Europe/Amsterdam"
    labels:
      - "chore(deps)"
      - "ci"
    commit-message:
      prefix: "chore(deps)"
    groups:
      actions:
        patterns: ["actions/*"]
      gradle-actions:
        patterns: ["gradle/*"]
