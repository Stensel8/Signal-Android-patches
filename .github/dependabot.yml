version: 2
updates:
  # Dependabot will update both the SHA and the inline version comment (e.g. # v6)
  # while leaving any extra documentation comments intact.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns: ["actions/*"]
      gradle-actions:
        patterns: ["gradle/*"]

  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10
